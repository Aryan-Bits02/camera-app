<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Remote Camera Viewer</title>
  <style>
    body { margin:0; background:#111;color:#eee;display:flex;justify-content:center;align-items:center;height:100vh;}
    #canvas { background:#000; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // Resize canvas to fit window
    const resize = () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    };
    window.addEventListener('resize', resize);
    resize();

    // Receive frames from the mobile phone
    socket.on('remoteFrame', dataURL => {
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      img.src = dataURL;
    });
  </script>
</body>
</html>
