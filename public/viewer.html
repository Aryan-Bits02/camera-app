<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

document.body.insertAdjacentHTML(
  "beforeend",
  '<div id="status" style="position:fixed;top:10px;left:10px;color:lime;font-size:20px;z-index:9999;">Connecting...</div>'
);

const status = document.getElementById("status");

socket.on("connect", () => {
  status.textContent = "Socket Connected";
});

socket.on("remoteFrame", dataURL => {
  status.textContent = "Receiving Frames";

  const img = new Image();

  img.onload = () => {
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  };

  img.src = dataURL;
});

socket.on("disconnect", () => {
  status.textContent = "Disconnected";
});
</script>
